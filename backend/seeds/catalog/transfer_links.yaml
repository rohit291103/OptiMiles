# Currency → program transfer relationships (schema v1.1: currency_transfer_partners).
# ratio_from : ratio_to = currency points consumed : partner miles credited.
# max_transfer_points = per CALENDAR YEAR unless noted (Axis Group A caps,
# research §2) — NULL/absent means uncapped.
#
# THE MOST DANGEROUS FILE IN THE REPO. A wrong ratio shipped confidently is
# the product's existential failure (PRD risk 8-A). Review every row.
#
# NOTE vs older docs: db-schema-v1 §3.1 example rows showed Infinia/Atlas at
# 2:1 — those were illustrative examples, superseded by the research doc's
# ratios (Infinia 1:1, Atlas 1:2). Where they conflict, the research doc wins.

- currency: hdfc-rp-premium
  partner: krisflyer
  ratio_from: 1
  ratio_to: 1
  min_transfer_points: 1000
  transfer_fee_inr: 0
  processing_days_min: 1
  processing_days_max: 5
  notes: Infinia/Diners Black tier, straightforward 1:1 (research §2 "HDFC Stability")
  source: docs/research/singapore_airlines_krisflyer_indian_credit_card_research_v1.md §1
  verified_on: 2026-07-04
  needs_verification: false

