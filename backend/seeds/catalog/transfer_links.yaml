- currency: axis-edge-miles
  partner: krisflyer
  ratio_from: 1
  ratio_to: 2
  min_transfer_points: 500
  max_transfer_points: 30000
  transfer_fee_inr: 235
  processing_days_min: 1
  processing_days_max: 3
  notes: >-
    Group A hard cap — 30,000 EDGE Miles per calendar year, i.e. max 60,000
    KrisFlyer miles/year through this avenue. Ratio survived the Apr-2026
    devaluation (confirmed post-deval by rivo.pe + pointsmath). Fee ₹199+GST
    ≈ ₹235 per transfer (pointsmath) — VERIFY exact amount. NOTE: Atlas is
    discontinued for NEW applicants (2026) — existing holders keep benefits;
    flagged for Stage 7's one-new-card archetype.
  source: pointsmath.com/axis-bank-transfer-partners (2026-06-21); rivo.pe Axis rewards guide 2026; research doc §1–2
  verified_on: 2026-07-04
  needs_verification: true

- currency: axis-edge-rewards
  partner: krisflyer
  ratio_from: 5
  ratio_to: 4
  min_transfer_points: 500
  max_transfer_points: 200000
  transfer_fee_inr: 235
  processing_days_min: 1
  processing_days_max: 3
  notes: >-
    MAGNUS BURGUNDY tier (replaces standard Magnus in this catalog per user
    scope decision 2026-07-04): 5:4 to Group A partners — double the standard
    Magnus 5:2. Group A cap 2,00,000 EDGE RP/calendar year (Group B 8L, 10L
    total across groups — only Group A modeled; KrisFlyer is Group A). Fee
    ₹199+GST ≈ ₹235 — VERIFY. Min transfer unconfirmed.
  source: cardexpert.in Magnus Burgundy review (2025-01-18) + pointsmath.com Axis table (2026-06-21) agree on 5:4 and the 2L Group A cap; rivo.pe's differing cap table treated as the outlier
  verified_on: 2026-07-04
  needs_verification: true

- currency: amex-mr
  partner: krisflyer
  ratio_from: 2
  ratio_to: 1
  min_transfer_points: 1000
  transfer_fee_inr: 0
