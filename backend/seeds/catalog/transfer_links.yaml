  processing_days_max: 10
  notes: Regalia tier 100:50 — confirmed by the pointsmath HDFC table (no longer market-knowledge-only)
  source: pointsmath.com/hdfc-bank-points-transfer-partners (updated 2026-06-21)
  verified_on: 2026-07-04
  needs_verification: false

- currency: hsbc-reward-points
  partner: krisflyer
  ratio_from: 1
  ratio_to: 1
  min_transfer_points: 1000
  transfer_fee_inr: 0
  processing_days_min: 0
  processing_days_max: 2
  notes: >-
    HSBC TravelOne transfers 1:1 to 12 of its 15 airline partners incl.
    KrisFlyer; app transfers are near-instant for most partners. Min-transfer
    figure unconfirmed.
  source: livefromalounge.com HSBC transfer partnerships; business-standard.com 2025-04-21; magnify.club TravelOne review 2026
  verified_on: 2026-07-04
