# Currency → program transfer relationships (schema v1.1: currency_transfer_partners).
# ratio_from : ratio_to = currency points consumed : partner miles credited.
# max_transfer_points = per CALENDAR YEAR unless noted (Axis group caps) —
# NULL/absent means uncapped.
#
# THE MOST DANGEROUS FILE IN THE REPO. A wrong ratio shipped confidently is
# the product's existential failure (PRD risk 8-A). Review every row.
#
# 2026-07-04 web-verification pass (decision log: catalog expansion):
# - Ratios cross-checked against pointsmath.com (HDFC table updated
#   2026-06-21; Axis table 2026-06-21), rivo.pe Axis guide (post Apr-2026
#   devaluation), cardtrail.in Amex MR guide (2026-03-20), and the HSBC
#   TravelOne partner list (livefromalounge.com / business-standard.com).
# - CORRECTED from the previous seed pass: Maharaja Club from HDFC premium
#   tier is 2:1, not 1:1; HDFC→KrisFlyer processing is ~7 working days, not
#   1-5; Magnus standard's 5:2 replaced by Magnus Burgundy's 5:4.
# - Axis REMOVED Marriott Bonvoy, Accor and Qatar on 2026-04-02 — no Axis
#   rows to the hotel programs, deliberately.

# ── KrisFlyer (primary program) ───────────────────────────────────────────

- currency: hdfc-rp-premium
  partner: krisflyer
  ratio_from: 1
  ratio_to: 1
  min_transfer_points: 1000
  transfer_fee_inr: 0
  processing_days_min: 7
  processing_days_max: 10
  notes: >-
    Infinia/Diners Black tier 1:1 (100:100). Processing is the outlier among
    HDFC partners: ~7 WORKING days (pointsmath, most other HDFC partners are
    24h). Min-transfer figure still unconfirmed.
  source: pointsmath.com/hdfc-bank-points-transfer-partners (updated 2026-06-21); ratio also research doc §1 and pointsmax.in KrisFlyer India guide 2026
  verified_on: 2026-07-04
  needs_verification: false

