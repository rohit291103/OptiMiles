# The 9 supported cards (mvp-scope-v2.md as amended by the 2026-07-04
# catalog-expansion decision: Magnus standard → Magnus Burgundy, Amex
# Platinum Charge added). earn rates are points per ₹100.
#
# SEEDING POLICY (decision-logged 2026-07-04): earn rates are seeded
# CONSERVATIVELY — every card gets a `default` category at its base rate;
# accelerated categories are added only where documented, so projections
# under-promise rather than over-promise. Caps are spend-INR per month
# (schema semantics: beyond the cap, spend earns base rate).

