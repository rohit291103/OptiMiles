# The 8 MVP cards (mvp-scope-v2.md). earn rates are points per ₹100.
#
# SEEDING POLICY (decision-logged 2026-07-04): earn rates are seeded
# CONSERVATIVELY — every card gets a `default` category at its base rate;
# accelerated categories are added only where documented, so projections
# under-promise rather than over-promise. Caps are spend-INR per month
# (schema semantics: beyond the cap, spend earns base rate).

- slug: hdfc-infinia
  bank: HDFC
  card_name: Infinia Metal
  card_network: Visa
  currency: hdfc-rp-premium
  annual_fee_inr: 12500
  joining_fee_inr: 12500
  base_earn_rate: "3.33"
  min_income_inr: 4800000
  has_lounge_access: true
  source: docs/research/singapore_airlines_krisflyer_indian_credit_card_research_v1.md §1 (5 RP per ₹150 ≈ 3.33/₹100); fee per db-schema-v1 example
  verified_on: 2026-07-04
  needs_verification: false
  categories:
    - category_slug: default
      category_label: All other spend
      earn_rate: "3.33"
      source: research §1 base rate
      verified_on: 2026-07-04
      needs_verification: false
    - category_slug: travel
      category_label: Travel via SmartBuy portal
      earn_rate: "16.65"
      monthly_cap_inr: 150000
      notes: >-
        5X of base via SmartBuy (research §2 says "up to 10X"; 5X seeded
        conservatively). Cap seeded as ₹1.5L/month spend — research §1's
        "1.5L RP monthly cap" reads as a POINTS cap; VERIFY unit and value.
      source: docs/research/...krisflyer...research_v1.md §1–2 (SmartBuy multiplier)
      verified_on: 2026-07-04
      needs_verification: true
  milestones: []

