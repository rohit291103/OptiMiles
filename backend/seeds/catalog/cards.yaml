- slug: axis-magnus-burgundy
  bank: Axis
  card_name: Magnus for Burgundy
  card_network: Visa
  currency: axis-edge-rewards
  annual_fee_inr: 30000
  joining_fee_inr: 30000
  base_earn_rate: "6.00"
  min_income_inr: null
  has_lounge_access: true
  notes: >-
    Replaces standard Magnus in this catalog (user scope decision
    2026-07-04). Eligibility is relationship-based (₹30L NRV with Axis
    Burgundy), not income-based — min_income left null. Welcome benefit is a
    ₹5,000 Yatra voucher (not points), so no welcome milestone row.
  source: cardexpert.in/axis-magnus-burgundy-credit-card-review (2025-01-18) — fee, rates, eligibility
  verified_on: 2026-07-04
  needs_verification: true
  categories:
    - category_slug: default
      category_label: All spend (tiered 35/₹200 above ₹1.5L/month not modeled)
      earn_rate: "6.00"
      notes: >-
        12 EDGE RP per ₹200 = 6/₹100. Burgundy earns MORE (35/₹200) on spend
        beyond ₹1.5L/month — the schema models accelerated-up-to-cap, not
        accelerated-above-threshold, so the flat base rate is seeded and the
        tier upside is deliberately left on the table (under-promise).
      source: cardexpert.in Magnus Burgundy review — VERIFY current earn table
      verified_on: 2026-07-04
      needs_verification: true
    - category_slug: travel
      category_label: Travel EDGE portal (5X)
      earn_rate: "30.00"
      monthly_cap_inr: 200000
      notes: >-
        60 RP/₹200 = 30/₹100 via Travel EDGE, capped at ₹2L/month spend
        (cardexpert "24% value-back up to ₹2L/month" at the 5:4 ratio).
        VERIFY the cap unit and whether direct airline spend qualifies.
      source: cardexpert.in Magnus Burgundy review (2025-01-18) — VERIFY post-Apr-2026
      verified_on: 2026-07-04
      needs_verification: true
  milestones: []

